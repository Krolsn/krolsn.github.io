<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projects — Karolis Snieckus</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wdth,wght@12..96,75..100,200..800&family=Poppins:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #ffffff;
      font-family: 'Poppins', sans-serif;
      color: #383838;
      min-height: 100vh;
    }

    /* Navbar */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 48px 12px;
    }

    .logo {
      font-size: 16px;
      color: #000;
      white-space: nowrap;
      min-width: 140px;
    }

    nav {
      display: flex;
      align-items: center;
      gap: 4px;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 999px;
      padding: 4px;
    }

    nav a {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 44px;
      padding: 0 16px;
      border-radius: 999px;
      font-size: 16px;
      text-decoration: none;
      color: #000;
      transition: background 0.15s;
    }

    nav a:hover { background: #f5f5f5; }

    nav a.active {
      background: #596dff;
      color: #fff;
    }

    .nav-spacer { min-width: 140px; }

    /* Main */
    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 32px 32px 80px;
    }

    h2 {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-variation-settings: "opsz" 14, "wdth" 100;
      font-size: 24px;
      font-weight: 400;
      color: #251753;
      margin-bottom: 24px;
    }

    /* Project cards */
    .projects {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .project-card {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .card-image {
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      overflow: hidden;
    }

    .card-image img {
      width: 100%;
      display: block;
      object-fit: cover;
      aspect-ratio: 16 / 9;
    }

    .card-title { font-size: 16px; }

    .project-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    @media (max-width: 640px) {
      header { padding: 20px; flex-wrap: wrap; gap: 12px; }
      .logo { min-width: unset; }
      .nav-spacer { display: none; }
      main { padding: 24px 20px 60px; }
      .project-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <header>
    <span class="logo">Karolis Snieckus</span>
    <nav>
      <a href="#">Home</a>
      <a href="#" class="active">Projects</a>
      <a href="#">Work</a>
      <a href="#">Contact</a>
    </nav>
    <div class="nav-spacer"></div>
  </header>

  <main>
    <h2>UX Projects</h2>

    <div class="projects">

      <div class="project-card">
        <div class="card-image">
          <img src="event-ticketing.png" alt="Event Ticketing App" />
        </div>
        <span class="card-title">Event Ticketing App</span>
      </div>

      <div class="project-row">
        <div class="project-card">
          <div class="card-image">
            <img src="pain-cards.png" alt="Pain Cards" />
          </div>
          <span class="card-title">Pain Cards</span>
        </div>

        <div class="project-card">
          <div class="card-image">
            <img src="boxd.png" alt="BOXD" />
          </div>
          <span class="card-title">BOXD</span>
        </div>
      </div>

    </div>
  </main>

</body>
</html>
